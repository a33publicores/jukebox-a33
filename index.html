<script>

function mostrarConfirm(texto) {
  return new Promise((resolve) => {

    let modal = document.createElement("div");

    modal.innerHTML = `
      <div style="
        position: fixed;
        top:0; left:0;
        width:100%;
        height:100%;
        background: rgba(0,0,0,0.7);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:9999;
      ">
        <div style="
          background:#111;
          color:#fff;
          padding:20px;
          border-radius:12px;
          text-align:center;
          max-width:300px;
        ">
          <p>${texto}</p>

          <button id="btnAceptar" style="
            margin-top:10px;
            padding:10px;
            background: linear-gradient(135deg, #00E5FF, #3B82F6, #A855F7);
            color: white;
            box-shadow: 0 0 10px rgba(59,130,246,0.6);
            border:none;
            border-radius:8px;
            margin-right:10px;
          ">Aceptar</button>

          <button id="btnCancelar" style="
            margin-top:10px;
            padding:10px;
            background:#444;
            color:white;
            border:none;
            border-radius:8px;
          ">Cancelar</button>

        </div>
      </div>
    `;

    document.body.appendChild(modal);

    modal.querySelector("#btnAceptar").onclick = () => {
      modal.remove();
      resolve(true);
    };

    modal.querySelector("#btnCancelar").onclick = () => {
      modal.remove();
      resolve(false);
    };

  });
}

function mostrarMensaje(texto) {
  let modal = document.createElement("div");

  modal.innerHTML = `
    <div style="
      position: fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
    ">
      <div style="
        background:#111;
        color:#fff;
        padding:20px;
        border-radius:12px;
        text-align:center;
        max-width:300px;
      ">
        <p>${texto}</p>
        <button onclick="this.parentElement.parentElement.remove()"
          style="
            margin-top:10px;
            padding:10px;
            background: linear-gradient(135deg, #00E5FF, #3B82F6, #A855F7);
            color: white;

            border:none;
            border-radius:8px;

          OK

    </div>
  `;

  document.body.appendChild(modal);
}

// 🔥 CACHE
let cache = {};

function normalizar(query){

}

function guardarCache(query, data){
  let cacheLocal = JSON.parse(localStorage.getItem("cacheYT")) || {};
  cacheLocal[query] = { data, time: Date.now() };
  localStorage.setItem("cacheYT", JSON.stringify(cacheLocal));
}

function obtenerCache(query){
  let cacheLocal = JSON.parse(localStorage.getItem("cacheYT")) || {};

  if(cacheLocal[query]){
    let tiempo = Date.now() - cacheLocal[query].time;

    if(tiempo < 1000 * 60 * 60 * 6){
      return cacheLocal[query].data;
    } else {
      delete cacheLocal[query];
      localStorage.setItem("cacheYT", JSON.stringify(cacheLocal));
    }
  }

  return null;
}

let nextPageToken = "";

let container = document.getElementById("results");
container.innerHTML = "";

if (!data.items || data.items.length === 0) {

async function seleccionar(item){

  document.getElementById("seleccionActual").innerHTML =
    "🎵 Seleccionaste: " + item.snippet.title;

  // 🔥 OBTENER TELÉFONO CORRECTAMENTE
  let telefono = localStorage.getItem("telefono");

  if(!telefono){
    mostrarMensaje("Debes ingresar tu número primero");
    return;
} 

  let confirmar = await mostrarConfirm(
  "¿Deseas agregar esta canción?\n\n" + item.snippet.title
);

  if(!confirmar){
    return;
  }

  try {

    let res = await fetch(BACKEND, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        tipo: "cancion",
        cliente: localStorage.getItem("cliente"),
        telefono: telefono,   // 🔥 YA CORRECTO
        titulo: item.snippet.title,
        canal: item.snippet.channelTitle,
        videoId: item.id.videoId
      })
    });

    let text = await res.text();

    console.log("RESPUESTA BACKEND:", text); // 🔥 DEBUG

    if(text === "LIMITE"){
      mostrarMensaje("🚫 Alcanzaste el límite de 15 canciones por hoy");
      return;
    }

    if(text && text.toLowerCase().includes("ok")){
      mostrarMensaje("✅ Canción agregada");
    } else {
      mostrarMensaje("❌ Error al agregar canción");
    }

  } catch (error) {
    console.error("ERROR FETCH:", error);
    mostrarMensaje("❌ Error de conexión");
  }
}

async function buscarVideos(reset = false){

  try {

    // 🔥 SI ES NUEVA BÚSQUEDA (botón buscar o ENTER)
    if (reset) {
      let input = document.getElementById("search");

      if (!input) {
        mostrarMensaje("Error: input no encontrado");
        return;
      }

      let query = input.value.trim();

      if (query.length < 3) {
        mostrarMensaje("Escribe al menos 3 letras");
        return;
      }

      currentQuery = query;
      nextPageToken = null;

      document.getElementById("results").innerHTML = ""; // limpiar
    }

    // 🔥 SI NO HAY QUERY (evita romper app)
    if (!currentQuery) {
      mostrarMensaje("Primero escribe algo para buscar");
      return;
    }

    let res = await fetch(`${BACKEND}/buscar?q=${currentQuery}&pageToken=${nextPageToken || ""}`);
    let data = await res.json();

    let container = document.getElementById("results");

    // 🔥 VALIDACIÓN
    if (!data.items || !Array.isArray(data.items)) {
      console.error("❌ items inválidos:", data);
      mostrarMensaje("Error en la búsqueda, intenta de nuevo");
      return;
    }

    data.items.forEach(item => {

      let div = document.createElement("div");
      div.className = "result";

      div.innerHTML = `
        <div style="display:flex; gap:10px;">
          <img src="${item.snippet.thumbnails.medium.url}" style="width:120px;">
          <div>
            <p>${item.snippet.title}</p>
            <small>${item.snippet.channelTitle}</small>
          </div>
        </div>
      `;

      div.onclick = () => seleccionar(item);
      container.appendChild(div);
    });

    nextPageToken = data.nextPageToken;

  } catch (error) {
    console.error("❌ ERROR FETCH:", error);
    alert("Error de conexión");
  }
}

window.onload = function(){

  let cliente = localStorage.getItem("cliente");
  let telefono = localStorage.getItem("telefono");

  let logo = localStorage.getItem("logoCliente");

  if(logo){
    let img = document.getElementById("logoCliente");
    img.src = logo;
    img.style.display = "block";
}

  if(!cliente){
    document.getElementById("codigoCliente").style.display = "flex";
    return;
  }

  if(cliente && !telefono){
    document.getElementById("bienvenida").style.display = "flex";
    return;
  }

    document.getElementById("jukebox").style.display = "block";
  }
  
};

  document.getElementById("jukebox").style.display = "none";

async function guardarCodigo(){

  let codigo = document.getElementById("codigoLugar").value.trim().toUpperCase();

  if(!codigo){
    mostrarMensaje("Ingresa código");
    return;
  }

  try {

    let res = await fetch(`${BACKEND}/validar_cliente?codigo=${codigo}`);
    let data = await res.json();

    if(!data.ok){
      mostrarMensaje("❌ Código inválido");
      return;
    }

    // ✅ guardar cliente válido
    localStorage.setItem("cliente", codigo);
    localStorage.setItem("logoCliente", data.logo || "");

    mostrarMensaje("✅ Bienvenido a " + data.nombre);

    document.getElementById("codigoCliente").style.display = "none";
    document.getElementById("bienvenida").style.display = "flex";

  } catch (error){
    console.error(error);
    mostrarMensaje("Error validando cliente");
  }
}

function cerrarSesion(){

  // 🔥 borrar sesión
  localStorage.removeItem("cliente");
  localStorage.removeItem("telefono");

  // 🔥 limpiar UI
  document.getElementById("jukebox").style.display = "none";
  document.getElementById("login").style.display = "none";
  document.getElementById("bienvenida").style.display = "none";
  document.getElementById("codigoCliente").style.display = "flex";

  // 🔥 limpiar inputs
  document.getElementById("codigoLugar").value = "";

  mostrarMensaje("Sesión cerrada");

}
