<!DOCTYPE html>
<html>
<head>
  <title>Jukebox Bar</title>
  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }

    input, select {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 12px 25px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #FFD700, #FFA500);
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      border: 1px solid #333;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .result:hover {
      background:#222;
    }

    h2 { color:#FFD700; }
  </style>
</head>

<body>

<!-- BIENVENIDA -->
<div id="bienvenida" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999;">
  <img src="https://lh3.googleusercontent.com/d/1SrytkKauKKYxaV4cgMu-wFAsq7_ywWKX" style="width:200px;">
  <p>🎶 Tú eliges la música 🎶</p>
  <button onclick="entrar()">Entrar</button>
</div>

<img src="https://lh3.googleusercontent.com/d/1SrytkKauKKYxaV4cgMu-wFAsq7_ywWKX" style="width:180px; margin-top:20px;">

<!-- REGISTRO -->
<div id="registro">
  <h2>Registro</h2>

  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <input id="telefono" placeholder="Teléfono">

  <select id="genero">
    <option value="">Selecciona tu género</option>
    <option>Reggaeton</option>
    <option>Popular</option>
    <option>Vallenato</option>
    <option>Salsa</option>
  </select>

  <button onclick="registrar()">Registrarse</button>
  <p><button onclick="mostrarLogin()">Ya tengo cuenta</button></p>
</div>

<!-- LOGIN -->
<div id="login" style="display:none;">
  <h2>Login</h2>

  <input id="loginEmail" placeholder="Correo">
  <input id="loginPassword" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
  <button onclick="volverRegistro()">⬅ Volver</button>
</div>

<!-- JUKEBOX -->
<div id="jukebox" style="display:none;">
  <h2>🎵 Buscar canción</h2>
  <input id="search" placeholder="Buscar...">
  <div id="results"></div>
</div>

<script>

const API_KEY = "AIzaSyDWez-XOlSj-L1vw8iP2R3P2DfFFgEMLRI";
const URL = "https://script.google.com/macros/s/AKfycbwT04THJti66PPh8JKXrG9EYI3lMae5j39IDccwth-yL6mfRPThJccNuFkgS5ZZ2PDNaQ/exec";

let nextPageToken = "";
let currentQuery = "";

// 🔥 TODO CARGA AQUÍ
window.addEventListener("load", function(){

  // 🔐 sesión
  let usuario = localStorage.getItem("usuario");
  if(usuario){
    mostrarJukebox();
  }

  // ENTER LOGIN
  document.getElementById("loginPassword").addEventListener("keypress", function(e){
    if(e.key === "Enter") login();
  });

  // ENTER REGISTRO
  document.getElementById("password").addEventListener("keypress", function(e){
    if(e.key === "Enter") registrar();
  });

  // BUSCADOR
  document.getElementById("search").addEventListener("keyup", async function(e){

    let query = e.target.value;
    let container = document.getElementById("results");

    if(query.trim() === "" || query.length < 3){
      container.innerHTML = "";
      return;
    }

    currentQuery = query;

    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=10&key=${API_KEY}`);
    let data = await res.json();

    container.innerHTML = "";

    data.items.forEach(item => {

      let div = document.createElement("div");
      div.className = "result";

      div.innerHTML = `
      <div style="display:flex;gap:10px;">
        <img src="${item.snippet.thumbnails.medium.url}" width="120">
        <div>
          <p>${item.snippet.title}</p>
          <small>${item.snippet.channelTitle}</small>
        </div>
      </div>`;

      div.onclick = () => seleccionar(item);
      container.appendChild(div);
    });

  });

});

// FUNCIONES

function entrar(){
  document.getElementById("bienvenida").style.display = "none";
}

function mostrarLogin(){
  document.getElementById("registro").style.display = "none";
  document.getElementById("login").style.display = "block";
}

function volverRegistro(){
  document.getElementById("login").style.display = "none";
  document.getElementById("registro").style.display = "block";
}

function mostrarJukebox(){
  document.getElementById("registro").style.display = "none";
  document.getElementById("login").style.display = "none";
  document.getElementById("jukebox").style.display = "block";
}

async function registrar(){

  let email = email.value;
  let password = document.getElementById("password").value;
  let telefono = document.getElementById("telefono").value;
  let genero = document.getElementById("genero").value;

  if(!email || !password || !telefono || !genero){
    alert("Completa todo");
    return;
  }

  await fetch(URL, {
    method:"POST",
    body: JSON.stringify({ tipo:"registro", email, password, telefono, genero })
  });

  alert("Registrado");
  mostrarLogin();
}

async function login(){

  let email = document.getElementById("loginEmail").value;
  let password = document.getElementById("loginPassword").value;

  let res = await fetch(URL, {
    method:"POST",
    body: JSON.stringify({ tipo:"login", email, password })
  });

  let text = await res.text();

  if(text === "OK"){
    localStorage.setItem("usuario", email);
    mostrarJukebox();
  } else {
    alert("Error");
  }
}

async function seleccionar(item){

  let usuario = localStorage.getItem("usuario");

  let confirmar = confirm("¿Agregar?\n" + item.snippet.title);
  if(!confirmar) return;

  await fetch(URL, {
    method:"POST",
    body: JSON.stringify({
      tipo:"cancion",
      usuario,
      titulo: item.snippet.title,
      canal: item.snippet.channelTitle,
      videoId: item.id.videoId
    })
  });

  alert("Agregada");
}

</script>

</body>
</html>
