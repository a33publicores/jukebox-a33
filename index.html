<!DOCTYPE html>
<html>
<head>

  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }

input {

h2 {

select {

body {

#splash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:9999;
}

/* 🔥 LOGO ANIMADO */
#logoAnimado {
  width:180px;
  animation: cerveza 2.5s ease-in-out;
}

/* 🔥 ANIMACIÓN PRINCIPAL */
@keyframes aparecer {
  0% { transform: scale(0.5); opacity:0; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity:1; }
}

/* 🔥 ANIMACIÓN MEJORADA */
@keyframes cerveza {
  0% {
    transform: scale(0.5) rotate(-10deg);
    opacity: 0;
  }
  40% {
    transform: scale(1.3) rotate(8deg);
  }
  70% {
    transform: scale(1.1) rotate(-3deg);
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

/* 🍺 ESPUMA */
#espuma {
  position: absolute;
  top: 38%; /* 🔥 antes estaba mal */
  width: 60px;
  height: 30px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  opacity: 0;
  animation: espuma 1.5s ease-out;
}

@keyframes espuma {
  0% { 
    opacity: 0; 
    transform: scale(0.5); 
  }
  50% { 
    opacity: 1; 
    transform: scale(1.2); 
  }
  100% { 
    opacity: 0; 
    transform: scale(1.5); 
  }
}

/* 📱 CONTENEDOR */
.contenedor {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 15px;
}

/* 🔥 LOGO NORMAL (pantalla principal) */
.logo {

  </style>

<body>

</div>

  <h2>Ingresa tu número</h2>

  <input 
    id="telefonoLogin" 
    placeholder="Ingresa tu número"

  >

</div>


<div id="jukebox" style="display:none;">
<p id="usuarioActivo" style="color:#FFD700;"></p>

<h1>🎵 Pide tu canción</h1>

<input type="text" id="search" placeholder="Busca canción o artista">

<div id="seleccionActual" style="margin:10px; color:#FFD700;"></div>

<div id="results"></div>

<button onclick="buscarVideos()">Ver más 🔽</button>

</div>

<script>

// 🔥 API KEYS
const API_KEYS = [
  "AIzaSyATYQhdszUE85yySE_-8W7H6ZeEHy9asyc",
  "AIzaSyDWez-XOlSj-L1vw8iP2R3P2DfFFgEMLRI",
  "AIzaSyBZhVDpGAdlDOHhwb9CWQKnKiYgW1Z4M18",
  "AIzaSyDeiCGBrpwf15wCkSPOKxTq_eC9pmQwZAs"
];

let apiIndex = 0;

// 🔥 CACHE
let cache = {};

// 🔥 CONTROL
let ultimoTiempo = 0;
let busquedas = JSON.parse(localStorage.getItem("busquedas")) || 0;

function normalizar(query){
  return query.toLowerCase().trim();
}

function guardarCache(query, data){
  let cacheLocal = JSON.parse(localStorage.getItem("cacheYT")) || {};
  cacheLocal[query] = { data, time: Date.now() };
  localStorage.setItem("cacheYT", JSON.stringify(cacheLocal));
}

function obtenerCache(query){
  let cacheLocal = JSON.parse(localStorage.getItem("cacheYT")) || {};

  if(cacheLocal[query]){
    let tiempo = Date.now() - cacheLocal[query].time;

    if(tiempo < 1000 * 60 * 60 * 6){
      return cacheLocal[query].data;
    } else {
      delete cacheLocal[query];
      localStorage.setItem("cacheYT", JSON.stringify(cacheLocal));
    }
  }

  return null;
}

async function buscarConRotacion(query){

  for(let i = 0; i < API_KEYS.length; i++){

    let key = API_KEYS[apiIndex];

    try{
      let res = await fetch("https://TU-APP.railway.app/buscar?q=" + query);
      let data = await res.json();

      if(!data.error){
        return data;
      }

      if(data.error.message.includes("quota") || data.error.code === 403){
        apiIndex = (apiIndex + 1) % API_KEYS.length;
      }

    } catch(e){
      apiIndex = (apiIndex + 1) % API_KEYS.length;
    }
  }

  alert("🚫 APIs agotadas");
  return null;
}

async function buscarOptimizado(query){

  query = normalizar(query);

  if(query.length < 5){
    alert("Escribe mejor la canción");
    return;
  }

  if(Date.now() - ultimoTiempo < 3000){
    alert("Espera 3 segundos");
    return;
  }

  ultimoTiempo = Date.now();

  if(busquedas >= 4){
    alert("Límite de búsquedas alcanzado");
    return;
  }

  busquedas++;
  localStorage.setItem("busquedas", busquedas);

  if(cache[query]) return cache[query];

  let local = obtenerCache(query);
  if(local){
    cache[query] = local;
    return local;
  }

  let data = await buscarConRotacion(query);

  if(data){
    cache[query] = data;
    guardarCache(query, data);
  }

  return data;
}


const API_KEY = "AIzaSyDWez-XOlSj-L1vw8iP2R3P2DfFFgEMLRI";
const URL = "https://script.google.com/macros/s/AKfycbwHewX4IVzfRZedlINcQ3obMb66rOjfGuxp8fToNy_vppKLPlv1H6sJ8kF_wp_DbbSJdA/exec";

let nextPageToken = "";
let currentQuery = "";


document.getElementById("search").addEventListener("keyup", async function(e){
    let query = e.target.value;

    if(query.length < 3) return;

    // 👇 NUEVO
    currentQuery = query;
    nextPageToken = "";

    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=10&key=${API_KEY}`);
    let data = await res.json();

    let container = document.getElementById("results");
    container.innerHTML = "";

    data.items.forEach(item => {
        let div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
        <div style="display:flex; align-items:center; gap:15px;">

          <img src="${item.snippet.thumbnails.medium.url}" 
               style="width:120px; height:70px; object-fit:cover; border-radius:8px;">

          <div style="text-align:left;">
            <p style="margin:0;">${item.snippet.title}</p>
            <small>${item.snippet.channelTitle}</small>
          </div>

        </div>
        `;

        div.onclick = () => seleccionar(item);
        container.appendChild(div);
    });

    // 👇 NUEVO (GUARDAR TOKEN)
    nextPageToken = data.nextPageToken;
});

async function seleccionar(item){

  document.getElementById("seleccionActual").innerHTML =
    "🎵 Seleccionaste: " + item.snippet.title;

  // 🔥 ya no usamos email → usamos teléfono guardado
  let telefono = localStorage.getItem("telefono");

  // 🔒 validación
  if(!telefono){
    alert("Debes ingresar tu número primero");
    return;
  }

  // 🔥 CONFIRMACIÓN ANTES DE ENVIAR
  let confirmar = confirm("¿Deseas agregar esta canción?\n\n" + item.snippet.title);

  if(!confirmar){
    return;
  }

  try {

    let res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        tipo: "cancion",
        telefono: telefono,   // 🔥 CLAVE
        titulo: item.snippet.title,
        canal: item.snippet.channelTitle,
        videoId: item.id.videoId
      })
    });

    let text = await res.text();

    if(text === "LIMITE"){
      alert("🚫 Alcanzaste el límite de 15 canciones por hoy");
      return;
    }

    if(text === "OK"){
      alert("✅ Canción agregada");
    } else {
      alert("❌ Error al agregar canción");
    }

  } catch (error) {
    console.error(error);
    alert("❌ Error de conexión");
  }
}

async function buscarVideos(reset = false){

    let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${currentQuery}&type=video&maxResults=10&key=${API_KEY}`;

    if(nextPageToken){
        url += `&pageToken=${nextPageToken}`;
    }

    let res = await fetch(url);
    let data = await res.json();

    let container = document.getElementById("results");

    if(reset){
        container.innerHTML = "";
    }

    data.items.forEach(item => {

        let div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
        <div style="display:flex; align-items:center; gap:15px;">

            <img src="${item.snippet.thumbnails.medium.url}" 
                 style="width:120px; height:70px; object-fit:cover; border-radius:8px;">

            <div style="text-align:left;">
              <p style="margin:0;">${item.snippet.title}</p>
              <small>${item.snippet.channelTitle}</small>
            </div>

        </div>
        `;

        div.onclick = () => seleccionar(item);
        container.appendChild(div);
    });

    nextPageToken = data.nextPageToken;
}

// MOSTRAR LOGIN
function mostrarLogin(){
  document.getElementById("registro").style.display = "none";
  document.getElementById("login").style.display = "block";
}

// REGISTRO CON VALIDACIÓN
async function registrar(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let telefono = document.getElementById("telefono").value;
  let genero = document.getElementById("genero").value;

  // 🔴 VALIDACIÓN (PASO 3)
  if(!email || !password || !telefono || !genero){
    alert("⚠️ Todos los campos son obligatorios");
    return;
  }

  await fetch(URL, {
    method:"POST",
    body: JSON.stringify({
      tipo:"registro",
      email,
      password,
      telefono,
      genero
    })
  });

  alert("✅ Registrado correctamente");

  // opcional: pasar directo a login
  mostrarLogin();
}

// LOGIN CON VALIDACIÓN
async function login(){

  let telefono = document.getElementById("telefonoLogin").value.trim();

  if(telefono.length < 8){
    alert("Número inválido");
    return;
  }

  try {

    let res = await fetch(URL, {
      method:"POST",
      body: JSON.stringify({
        tipo:"login",
        telefono
      })
    });

    let text = await res.text();

    console.log("Respuesta:", text);

    if(text.trim().toUpperCase() === "OK"){

      localStorage.setItem("telefono", telefono);

      document.getElementById("login").style.display = "none";
      document.getElementById("jukebox").style.display = "block";

    } else {
      alert("Error al ingresar");
    }

  } catch (error) {
    console.error(error);
    alert("Error de conexión");
  }
}

function entrar(){
  document.getElementById("bienvenida").style.display = "none";
  document.getElementById("login").style.display = "block";
}

function volverRegistro(){
  document.getElementById("login").style.display = "none";
  document.getElementById("registro").style.display = "block";
}

let user = localStorage.getItem("usuario");
if(user){
  document.getElementById("usuarioActivo").innerText = "👤 " + user;
}

function logout(){
  localStorage.removeItem("usuario");
  location.reload();
}

let sonido = new Audio("https://drive.google.com/uc?export=download&id=12dmGFjAHowmhSIRU6kaFFCVVr902M594");

window.addEventListener("load", function(){

  // 🔥 FORZAR ANIMACIÓN DEL LOGO
  let logo = document.getElementById("logoAnimado");
  if(logo){
    logo.style.animation = "none";
    logo.offsetHeight; // reinicia animación
    logo.style.animation = "cerveza 2.5s ease-in-out";
  }

  // 🔥 INTENTAR SONIDO (DESKTOP)
  sonido.play().catch(()=>{});

  // 🔥 ACTIVAR SONIDO EN MÓVIL (cuando toque pantalla)
  document.body.addEventListener("click", function(){
    sonido.play().catch(()=>{});
  }, { once: true });

  // 🔥 vibración (sí funciona siempre)
  if(navigator.vibrate){
    navigator.vibrate(200);
  }

  // 🔥 quitar splash con fade (más pro)
  setTimeout(()=>{
    let splash = document.getElementById("splash");

    if(splash){
      splash.style.transition = "opacity 0.5s";
      splash.style.opacity = "0";

      setTimeout(()=>{
        splash.style.display = "none";
      }, 500);
    }

  }, 2500);

});

document.getElementById("search").addEventListener("keypress", async function(e){

  if(e.key === "Enter"){

    let query = e.target.value;

    let data = await buscarOptimizado(query);
    if(!data) return;

    let container = document.getElementById("results");
    container.innerHTML = "";

    data.items.forEach(item => {

      let div = document.createElement("div");
      div.className = "result";

      div.innerHTML = `
        <div style="display:flex; gap:10px;">
          <img src="${item.snippet.thumbnails.medium.url}" style="width:120px;">
          <div>
            <p>${item.snippet.title}</p>
            <small>${item.snippet.channelTitle}</small>
          </div>
        </div>
      `;

      div.onclick = () => seleccionar(item);
      container.appendChild(div);
    });

  }

});

window.onload = function(){

  let tel = localStorage.getItem("telefono");

  if(tel){
    document.getElementById("login").style.display = "none";
    document.getElementById("jukebox").style.display = "block";
  }

};

</script>
