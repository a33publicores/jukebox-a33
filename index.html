<!DOCTYPE html>
<html>
<head>
  <title>Jukebox Bar</title>
  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }
    input { width:80%; padding:10px; font-size:18px; }
    .result { border:1px solid #333; margin:10px; padding:10px; cursor:pointer; }
    .result:hover { background:#222; }
    
    button {
  padding: 12px 25px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #FFD700, #FFA500);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

input {
  width: 80%;
  padding: 12px;
  margin: 8px;
  border-radius: 6px;
  border: none;
}

h2 {
  margin-top: 20px;
  color: #FFD700;
}

select {
  width: 80%;
  padding: 12px;
  margin: 8px;
  border-radius: 6px;
  border: none;
}

  </style>
</head>

<body>

<img src="https://lh3.googleusercontent.com/d/1SrytkKauKKYxaV4cgMu-wFAsq7_ywWKX" style="width:180px; margin-top:20px;">

<div id="registro">

<h2>Registro</h2>

<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<input id="telefono" placeholder="Teléfono"><br>
<select id="genero">
  <option value="">Selecciona tu género musical</option>

  <option>🎧 Reggaeton</option>
  <option>🍺 Popular</option>
  <option>Rancheras</option>
  <option>Corridos</option>
  <option>🎤 Vallenato</option>
  <option>🎺 Salsa</option>
  <option>Bachata</option>
  <option>Merengue</option>
  <option>Champeta</option>
  <option>Rock</option>
  <option>Electrónica</option>
  <option>Trap</option>
  <option>Hip Hop</option>
  <option>Baladas</option>
  <option>Otro</option>
</select>

<button onclick="registrar()">Registrarse</button>

<p>¿Ya tienes cuenta? <button onclick="mostrarLogin()">Login</button></p>

</div>


<div id="login" style="display:none;">

<h2>Login</h2>

<input id="loginEmail" placeholder="Correo"><br>
<input id="loginPassword" type="password" placeholder="Contraseña"><br>

<button onclick="login()">Ingresar</button>

</div>


<div id="jukebox" style="display:none;">

<h1>🎵 Pide tu canción</h1>

<input type="text" id="search" placeholder="Busca canción o artista">

<div id="results"></div>

</div>

<script>
const API_KEY = "AIzaSyDdQIS-GrSo-SW_hvjLQCMvhsjtenJzgrY";
const URL = "https://script.google.com/macros/s/AKfycbxSPD3oQZlYfHM8cqIb7YUrqlzEOW5jaFPHuZTEu6ZWWpdMDn_5KAzGdYkLiYF__oTDRw/exec";

document.getElementById("search").addEventListener("keyup", async function(e){
    let query = e.target.value;

    if(query.length < 3) return;

    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&key=${API_KEY}`);
    let data = await res.json();

    let container = document.getElementById("results");
    container.innerHTML = "";

    data.items.forEach(item => {
        let div = document.createElement("div");
        div.className = "result";
        div.innerHTML = `
            <p>${item.snippet.title}</p>
            <small>${item.snippet.channelTitle}</small>
        `;

        div.onclick = () => seleccionar(item);
        container.appendChild(div);
    });
});

async function seleccionar(item){

    alert("Agregada: " + item.snippet.title);

    await fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            tipo: "cancion",
            titulo: item.snippet.title,
            canal: item.snippet.channelTitle,
            videoId: item.id.videoId
        })
    });

}

// MOSTRAR LOGIN
function mostrarLogin(){
  document.getElementById("registro").style.display = "none";
  document.getElementById("login").style.display = "block";
}

// REGISTRO CON VALIDACIÓN
async function registrar(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let telefono = document.getElementById("telefono").value;
  let genero = document.getElementById("genero").value;

  // 🔴 VALIDACIÓN (PASO 3)
  if(!email || !password || !telefono || !genero){
    alert("⚠️ Todos los campos son obligatorios");
    return;
  }

  await fetch(URL, {
    method:"POST",
    body: JSON.stringify({
      tipo:"registro",
      email,
      password,
      telefono,
      genero
    })
  });

  alert("✅ Registrado correctamente");

  // opcional: pasar directo a login
  mostrarLogin();
}

// LOGIN CON VALIDACIÓN
async function login(){

  let email = document.getElementById("loginEmail").value;
  let password = document.getElementById("loginPassword").value;

  if(!email || !password){
    alert("⚠️ Ingresa correo y contraseña");
    return;
  }

  let res = await fetch(URL, {
    method:"POST",
    body: JSON.stringify({
      tipo:"login",
      email,
      password
    })
  });

  let text = await res.text();

  if(text === "OK"){
    document.getElementById("login").style.display = "none";
    document.getElementById("jukebox").style.display = "block";
  } else {
    alert("❌ Datos incorrectos");
  }
}
</script>

</body>
</html>
